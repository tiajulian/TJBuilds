<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a12"/>

  <!-- Dot grid -->
  <defs>
    <pattern id="dots" x="0" y="0" width="44" height="44" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#6366f1" opacity="0.2"/>
    </pattern>
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="glow1" cx="80%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="10%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#dots)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Left accent line -->
  <rect x="80" y="180" width="3" height="60" rx="2" fill="url(#nameGrad)"/>

  <!-- Eyebrow -->
  <text x="100" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#818cf8" letter-spacing="3" text-anchor="start">ANALYTICS ENGINEER · PROBLEM SOLVER · BUILDER</text>

  <!-- Name -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" fill="white" letter-spacing="-4">Tia</text>
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="900" fill="url(#nameGrad)" letter-spacing="-4">Julian.</text>

  <!-- Tagline -->
  <text x="80" y="520" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="300" fill="#cbd5e1">I turn real-world problems into clean, working solutions.</text>

  <!-- URL badge -->
  <rect x="80" y="556" width="300" height="36" rx="18" fill="#1e1e2e" stroke="#6366f1" stroke-opacity="0.3" stroke-width="1"/>
  <text x="230" y="579" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="500" fill="#94a3b8" text-anchor="middle">tiajulian.github.io/TJBuilds</text>
</svg>
